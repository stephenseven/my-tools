<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>综合工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f5f5f0;
        font-family: "微软雅黑", sans-serif;
        padding: 5px 10px;
        overflow: hidden;
      }
      .tab-bar {
        display: flex;
        background: #4a627a;
        border-radius: 16px 16px 0 0;
        margin-bottom: 15px;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        color: white;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        border-radius: 16px 16px 0 0;
        transition: all 0.2s;
      }
      .tab.active {
        background: #2c3e50;
      }
      .tab:not(.active):hover {
        background: #5a7a9a;
      }
      .panel {
        display: none;
      }
      .panel.active {
        display: block;
      }
      .card {
        background: white;
        border-radius: 16px;
        margin-bottom: 20px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .card-header {
        background: #4a627a;
        color: white;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
      }
      .card-body {
        padding: 16px;
      }

      /* Tab1 三大版块样式 */
      .calendar-clip {
        width: 100%;
        height: 575px;
        overflow: hidden;
        position: relative;
        background: white;
      }
      .calendar-iframe {
        position: absolute;
        top: -140px;
        left: 0;
        width: 100%;
        height: 700px;
        border: none;
      }
      .rate-table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      .rate-table th,
      .rate-table td {
        text-align: center;
        padding: 12px 10px;
        border-bottom: 1px solid #ecf0f1;
      }
      .rate-table th {
        background: #f8f9fa;
        color: #2c3e50;
      }
      .quote-rate {
        color: #e67e22;
        font-weight: bold;
        font-size: 23px;
      }
      .margin-input {
        width: 80px;
        text-align: center;
        padding: 5px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 23px;
        color: #2c3e50;
      }
      .update-row {
        text-align: center;
        font-size: 18px;
        color: #7f8c8d;
        padding-top: 12px;
        margin-top: 8px;
      }
      .update-link {
        margin: 2px;
      }
      #bankLink {
        margin-left: 3px;
      }
      .update-link a {
        color: inherit;
        text-decoration: underline;
      }
      .update-link a:hover {
        color: #3498db;
        text-decoration: underline;
      }
      .note {
        background: #fef9e7;
        padding: 8px 12px;
        font-size: 17px;
        color: #555555;
        text-align: center;
        margin-top: 12px;
        border-radius: 8px;
      }
      .week-row-first {
        background: #f8f9fa;
        padding: 13px 16px;
        border-radius: 8px;
        margin-bottom: 12px;
        text-align: center;
        font-size: 25px;
        font-weight: bold;
        color: #2c3e50;
      }
      .week-row-second {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 23px;
        color: #2c3e50;
        line-height: 1.5;
      }
      .week-input {
        width: 60px;
        text-align: center;
        padding: 3px 5px;
        margin: 6px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 23px;
        color: #2c3e50;
      }

      /* Tab2 三大版块样式 */
      .weather-card {
        padding: 0;
        height: 450px;
      }
      .weather-card iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .time-card {
        padding: 0;
        height: 380px;
      }
      .time-card iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .express-card {
        padding: 0;
        height: 320px;
      }
      .express-card iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="tab-bar">
      <div class="tab active" data-mode="main">📋 常用工具</div>
      <div class="tab" data-mode="other">🔧 其他工具</div>
    </div>

    <!-- Tab1：常用工具 -->
    <div id="mainPanel" class="panel active">
      <div class="card">
        <div class="card-header">📅 万年历</div>
        <div class="card-body" style="padding: 0">
          <div class="calendar-clip">
            <iframe
              class="calendar-iframe"
              src="https://hao.360.com/rili/"
              scrolling="no"
              frameborder="0"
            ></iframe>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">💰 实时汇率</div>
        <div class="card-body">
          <table class="rate-table">
            <thead>
              <tr>
                <th>货币</th>
                <th>现汇买入价</th>
                <th>安全边际</th>
                <th>报价汇率</th>
              <tr>
            </thead>
            <tbody>
              <tr id="usdRow">
                <td>美元 (USD)</td>
                <td id="usdRate">--<\/td>
                <td>
                  <input
                    type="text"
                    id="margin1"
                    class="margin-input"
                    value="0.15"
                  />
                <\/td>
                <td id="usdQuote" class="quote-rate">--<\/td>
              <\/tr>
              <tr id="eurRow">
                <td>欧元 (EUR)<\/td>
                <td id="eurRate">--<\/td>
                <td>
                  <input
                    type="text"
                    id="margin2"
                    class="margin-input"
                    value="0.15"
                  />
                <\/td>
                <td id="eurQuote" class="quote-rate">--<\/td>
              <\/tr>
              <tr id="audRow">
                <td>澳元 (AUD)<\/td>
                <td id="audRate">--<\/td>
                <td>
                  <input
                    type="text"
                    id="margin3"
                    class="margin-input"
                    value="0.15"
                  />
                <\/td>
                <td id="audQuote" class="quote-rate">--<\/td>
              <\/tr>
            </tbody>
          <\/table>
          <div class="update-row">
            <span id="updateTime">数据更新时间：--</span>
            <span class="update-link"
              ><a id="bankLink" href="#">访问中行官网</a></span
            >
            <span class="update-link"
              ><a id="savvyLink" href="#">赛纬橡塑</a></span
            >
          </div>
          <div class="note">
            报价汇率 = (现汇买入价 - 安全边际) 向下取整0.05
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">📆 周数计算</div>
        <div class="card-body">
          <div class="week-row-first">
            <span>今天是</span><span id="currentYearWeek">--</span>
          </div>
          <div class="week-row-second">
            <span>第</span
            ><input type="text" id="weekIn" class="week-input" value="" /><span
              >周：</span
            ><span id="weekRes">--</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab2：其他工具 -->
    <div id="otherPanel" class="panel">
      <div class="card">
        <div class="card-header">🌤️ 实时天气 - 宁波鄞州</div>
        <div class="card-body weather-card">
          <iframe
            src="https://www.weather.com.cn/weather/101210411.shtml"
            scrolling="no"
            frameborder="0"
          ></iframe>
        </div>
      </div>
      <div class="card">
        <div class="card-header">🕐 世界时间</div>
        <div class="card-body time-card">
          <iframe
            src="https://time.is/"
            scrolling="no"
            frameborder="0"
          ></iframe>
        </div>
      </div>
      <div class="card">
        <div class="card-header">📦 快递查询 - UPS</div>
        <div class="card-body express-card">
          <iframe
            src="https://www.ups.com/track?loc=zh_CN&requester=ST/"
            scrolling="no"
            frameborder="0"
          ></iframe>
        </div>
      </div>
    </div>

    <script>
      var tabs = document.querySelectorAll(".tab");
      var mainPanel = document.getElementById("mainPanel");
      var otherPanel = document.getElementById("otherPanel");

      function switchTab(mode) {
        if (mode === "main") {
          mainPanel.classList.add("active");
          otherPanel.classList.remove("active");
          // WebView2 调用方式
          if (typeof chrome !== 'undefined' && chrome.webview && chrome.webview.hostObjects && chrome.webview.hostObjects.ahk) {
            chrome.webview.hostObjects.ahk.ResizeWindow(960);
          } else if (window.ahkResizeWindow) {
            window.ahkResizeWindow(960);
          }
        } else {
          mainPanel.classList.remove("active");
          otherPanel.classList.add("active");
          if (typeof chrome !== 'undefined' && chrome.webview && chrome.webview.hostObjects && chrome.webview.hostObjects.ahk) {
            chrome.webview.hostObjects.ahk.ResizeWindow(1060);
          } else if (window.ahkResizeWindow) {
            window.ahkResizeWindow(1060);
          }
        }
      }

      for (var i = 0; i < tabs.length; i++) {
        (function (idx) {
          var tab = tabs[idx];
          tab.onclick = function () {
            var mode = this.getAttribute("data-mode");
            for (var j = 0; j < tabs.length; j++) {
              tabs[j].classList.remove("active");
            }
            this.classList.add("active");
            switchTab(mode);
          };
        })(i);
      }

      function g(id) {
        var e = document.getElementById(id);
        return e ? e.innerText || e.textContent || "--" : "--";
      }
      function s(id, v) {
        var e = document.getElementById(id);
        if (e) e.innerText = v;
      }

      function calc(rate, margin) {
        if (rate == "--" || rate == "" || rate == null) return "--";
        var r = parseFloat(rate),
          m = parseFloat(margin);
        if (isNaN(r) || isNaN(m)) return "--";
        return (Math.floor((r - m) / 0.05 + 0.0001) * 0.05).toFixed(2);
      }

      function refresh() {
        var mVal = document.getElementById("margin1").value;
        s("usdQuote", calc(g("usdRate"), mVal));
        s("eurQuote", calc(g("eurRate"), mVal));
        s("audQuote", calc(g("audRate"), mVal));
      }

      function sync(val) {
        document.getElementById("margin1").value = val;
        document.getElementById("margin2").value = val;
        document.getElementById("margin3").value = val;
        refresh();
      }

      function getWeekRange(year, wn) {
        var d = new Date(year, 0, 4);
        while (d.getDay() != 4) d.setDate(d.getDate() - 1);
        d.setDate(d.getDate() - 3);
        d.setDate(d.getDate() + (wn - 1) * 7);
        var mon = new Date(d),
          sun = new Date(d);
        sun.setDate(d.getDate() + 6);
        function fmt(x) {
          return (
            x.getFullYear() +
            "年" +
            (x.getMonth() + 1) +
            "月" +
            x.getDate() +
            "日"
          );
        }
        return fmt(mon) + " - " + fmt(sun) + "（周一至周日）";
      }

      function getCurrentWeek() {
        var now = new Date();
        var d = new Date(now.getFullYear(), 0, 4);
        while (d.getDay() != 4) d.setDate(d.getDate() - 1);
        d.setDate(d.getDate() - 3);
        var diff = Math.floor((now - d) / (24 * 3600 * 1000));
        return Math.floor(diff / 7) + 1;
      }

      function bindEvents() {
        var ids = ["margin1", "margin2", "margin3"];
        for (var i = 0; i < ids.length; i++) {
          var el = document.getElementById(ids[i]);
          if (el) {
            el.oninput = function () {
              sync(this.value);
            };
            el.onblur = function () {
              if (this.value == "") sync("0.15");
            };
          }
        }
        var wkIn = document.getElementById("weekIn");
        if (wkIn) {
          wkIn.oninput = function () {
            var v = parseInt(this.value),
              y = new Date().getFullYear();
            if (!isNaN(v) && v >= 1 && v <= 53)
              s("weekRes", getWeekRange(y, v));
            else s("weekRes", "请输入1-53");
          };
        }
      }

      function init() {
        var cw = getCurrentWeek(),
          cy = new Date().getFullYear();
        s("currentYearWeek", cy + "年第" + cw + "周");
        var wkIn = document.getElementById("weekIn");
        if (wkIn) {
          wkIn.value = cw;
          s("weekRes", getWeekRange(cy, cw));
        }
        bindEvents();
      }

      init();
      window.refreshRates = function () {
        refresh();
      };
      setInterval(function () {
        if (g("usdQuote") == "--" && g("usdRate") != "--") refresh();
      }, 1000);
    </script>
  </body>
</html>
