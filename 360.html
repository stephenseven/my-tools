<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>综合工具</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f5f5f0;
        font-family: "微软雅黑", sans-serif;
        padding: 5px 10px;
        overflow: hidden;
      }
      .card {
        background: white;
        border-radius: 16px;
        margin-bottom: 20px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .card-header {
        background: #4a627a;
        color: white;
        padding: 12px 20px;
        font-size: 16px;
        font-weight: bold;
      }
      .card-body {
        padding: 16px;
      }
      .calendar-clip {
        width: 1000px;
        height: 705px;
        overflow: hidden;
        position: relative;
        background: white;
      }

      .calendar-iframe {
        position: absolute;
        /* 1. 稍微下移，避开顶部的棕色条 */
        top: -200px;

        /* 2. 这里的负值非常关键，决定了左边切掉多少 */
        left: 11px;

        /* 3. 必须保持一个宽广的画布 */
        width: 1000px;
        height: 1000px;

        /* 4. 关键点：不要过分放大！ */
        /* 1.1 左右通常是 700px 容器下最完美的比例 */
        transform: scale(1.19);
        transform-origin: 0 0;
        border: none;
      }

      .rate-table {
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
      }
      .rate-table th,
      .rate-table td {
        text-align: center;
        padding: 12px 10px;
        border-bottom: 1px solid #ecf0f1;
      }
      .rate-table th {
        background: #f8f9fa;
        color: #2c3e50;
      }
      .quote-rate {
        color: #e67e22;
        font-weight: bold;
        font-size: 23px;
      }
      .margin-input {
        width: 80px;
        text-align: center;
        padding: 5px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 23px;
        color: #2c3e50;
      }
      .update-row {
        text-align: center;
        font-size: 18px;
        color: #7f8c8d;
        padding-top: 12px;
        margin-top: 8px;
      }

      .update-link {
        margin: 2px;
      }

      #bankLink {
        margin-left: 3px;
      }

      .update-link a {
        color: inherit;
        text-decoration: underline;
      }
      .update-link a:hover {
        color: #3498db;
        text-decoration: underline;
      }
      .note {
        background: #fef9e7;
        padding: 8px 12px;
        font-size: 17px;
        color: #555555;
        text-align: center;
        margin-top: 12px;
        border-radius: 8px;
      }
      .week-row-first {
        background: #f8f9fa;
        padding: 13px 16px;
        border-radius: 8px;
        margin-bottom: 12px;
        text-align: center;
        font-size: 25px;
        font-weight: bold;
        color: #2c3e50;
      }
      .week-row-second {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 23px;
        color: #2c3e50;
        line-height: 1.5;
      }
      .week-input {
        width: 60px;
        text-align: center;
        padding: 3px 5px;
        margin: 6px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 23px;
        color: #2c3e50;
      }
    </style>
  </head>
  <body>
    <!-- 万年历 -->
    <div class="card">
      <div class="card-header">📅 万年历</div>
      <div class="card-body" style="padding: 0">
        <div class="calendar-clip">
          <iframe
            class="calendar-iframe"
            src="https://hao.360.com/rili/"
            scrolling="no"
            frameborder="0"
          ></iframe>
        </div>
      </div>
    </div>

    <!-- 汇率 -->
    <div class="card">
      <div class="card-header">💰 实时汇率</div>
      <div class="card-body">
        <table class="rate-table">
          <thead>
            <tr>
              <th>货币</th>
              <th>现汇买入价</th>
              <th>安全边际</th>
              <th>报价汇率</th>
            </tr>
          </thead>
          <tbody>
            <tr id="usdRow">
              <td>美元 (USD)</td>
              <td id="usdRate">--</td>
              <td>
                <input
                  type="text"
                  id="margin1"
                  class="margin-input"
                  value="0.15"
                />
              </td>
              <td id="usdQuote" class="quote-rate">--</td>
            </tr>
            <tr id="eurRow">
              <td>欧元 (EUR)</td>
              <td id="eurRate">--</td>
              <td>
                <input
                  type="text"
                  id="margin2"
                  class="margin-input"
                  value="0.15"
                />
              </td>
              <td id="eurQuote" class="quote-rate">--</td>
            </tr>
            <tr id="audRow">
              <td>澳元 (AUD)</td>
              <td id="audRate">--</td>
              <td>
                <input
                  type="text"
                  id="margin3"
                  class="margin-input"
                  value="0.15"
                />
              </td>
              <td id="audQuote" class="quote-rate">--</td>
            </tr>
          </tbody>
        </table>
        <div class="update-row">
          <span id="updateTime">数据更新时间：--</span>
          <span class="update-link">
            <a id="bankLink" href="#">访问中行官网</a>
          </span>
          <span class="update-link">
            <a id="savvyLink" href="#">赛纬橡塑</a>
          </span>
        </div>
        <div class="note">报价汇率 = (现汇买入价 - 安全边际) 向下取整0.05</div>
      </div>
    </div>

    <!-- 周数计算 -->
    <div class="card">
      <div class="card-header">📆 周数计算</div>
      <div class="card-body">
        <div class="week-row-first">
          <span>今天是</span>
          <span id="currentYearWeek">--</span>
        </div>
        <div class="week-row-second">
          <span>第</span>
          <input type="text" id="weekIn" class="week-input" value="" />
          <span>周：</span>
          <span id="weekRes">--</span>
        </div>
      </div>
    </div>

    <script>
     

      function g(id) {
        var e = document.getElementById(id);
        return e ? e.innerText || e.textContent || "--" : "--";
      }
      function s(id, v) {
        var e = document.getElementById(id);
        if (e) e.innerText = v;
      }

      function calc(rate, margin) {
        if (rate == "--" || rate == "" || rate == null) return "--";
        var r = parseFloat(rate);
        var m = parseFloat(margin);
        if (isNaN(r) || isNaN(m)) return "--";
        var res = Math.floor((r - m) / 0.05 + 0.0001) * 0.05;
        return res.toFixed(2);
      }

      function refresh() {
        var mVal = document.getElementById("margin1").value;
        s("usdQuote", calc(g("usdRate"), mVal));
        s("eurQuote", calc(g("eurRate"), mVal));
        s("audQuote", calc(g("audRate"), mVal));
      }

      function sync(val) {
        document.getElementById("margin1").value = val;
        document.getElementById("margin2").value = val;
        document.getElementById("margin3").value = val;
        refresh();
      }

      function getWeekRange(year, wn) {
        var d = new Date(year, 0, 4);
        while (d.getDay() != 4) d.setDate(d.getDate() - 1);
        d.setDate(d.getDate() - 3);
        d.setDate(d.getDate() + (wn - 1) * 7);
        var mon = new Date(d);
        var sun = new Date(d);
        sun.setDate(d.getDate() + 6);
        function fmt(x) {
          return (
            x.getFullYear() +
            "年" +
            (x.getMonth() + 1) +
            "月" +
            x.getDate() +
            "日"
          );
        }
        return fmt(mon) + " - " + fmt(sun) + "（周一至周日）";
      }

      function getCurrentWeek() {
        var now = new Date();
        var d = new Date(now.getFullYear(), 0, 4);
        while (d.getDay() != 4) d.setDate(d.getDate() - 1);
        d.setDate(d.getDate() - 3);
        var diff = Math.floor((now - d) / (24 * 3600 * 1000));
        return Math.floor(diff / 7) + 1;
      }

      function bindEvents() {
        var ids = ["margin1", "margin2", "margin3"];
        for (var i = 0; i < ids.length; i++) {
          var el = document.getElementById(ids[i]);
          if (el) {
            el.oninput = function () {
              sync(this.value);
            };
            el.onblur = function () {
              if (this.value == "") sync("0.15");
            };
          }
        }

        var wkIn = document.getElementById("weekIn");
        if (wkIn) {
          wkIn.oninput = function () {
            var v = parseInt(this.value);
            var y = new Date().getFullYear();
            if (!isNaN(v) && v >= 1 && v <= 53) {
              s("weekRes", getWeekRange(y, v));
            } else {
              s("weekRes", "请输入1-53");
            }
          };
        }
      }

      function init() {
        var cw = getCurrentWeek();
        var cy = new Date().getFullYear();
        s("currentYearWeek", cy + "年第" + cw + "周");
        var wkIn = document.getElementById("weekIn");
        if (wkIn) {
          wkIn.value = cw;
          s("weekRes", getWeekRange(cy, cw));
        }
        bindEvents();
      }

      init();

      window.refreshRates = function () {
        refresh();
      };

      setInterval(function () {
        if (g("usdQuote") == "--" && g("usdRate") != "--") refresh();
      }, 1000);
    </script>
  </body>
</html>
